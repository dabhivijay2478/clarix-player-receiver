<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' http: https: data: blob:; script-src 'self' http: https: 'unsafe-inline' 'unsafe-eval'; style-src 'self' http: https: 'unsafe-inline'; img-src 'self' http: https: data: blob:; connect-src 'self' http: https: ws: wss:; media-src 'self' http: https: data: blob:; font-src 'self' http: https: data:; frame-src 'self' http: https: about: data:; worker-src 'self' http: https: blob:; object-src 'none'; base-uri 'self' http: https:; form-action 'none'">
  <title>MG Enterprise Receiver</title>
  <link rel="stylesheet" href="css/receiver.css">
</head>
<body>
  <main id="offline" class="offline" aria-live="polite">
    <img class="logo" src="logo.png" alt="">
    <h1>MG Enterprise</h1>
    <p id="status">Waiting for Controller...</p>
    <div class="controller-label">Controller:</div>
    <div id="controller" class="controller-address">Not set</div>
    <form id="controller-form" class="controller-form" autocomplete="off">
      <label class="field-label" for="controller-ip">Controller IP</label>
      <div class="controller-controls">
        <input id="controller-ip" class="controller-input" name="controllerIp" type="text" spellcheck="false" autocapitalize="off" autocorrect="off" enterkeyhint="go" maxlength="64" placeholder="Controller IP" tabindex="1" autofocus required>
        <button id="edit-ip-button" class="control-button" type="button" tabindex="2">Edit IP</button>
        <button id="connect-button" class="control-button primary" type="submit" tabindex="3">Connect</button>
        <button id="retry-button" class="control-button" type="button" tabindex="4">Retry</button>
      </div>
    </form>
    <div id="retry" class="retrying">Retrying...</div>
  </main>
  <div id="player-host" class="player-host" hidden></div>
  <script src="js/receiver-core.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
